<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Tech Solutions | Contact</title>
		<link rel="stylesheet" href="/style.css" />
	</head>
	<body>
		<!-- Navigation bar -->
		<nav>
			<a href="/home">Home</a>
			<a href="/about">About</a>
			<a href="/contact">Contact</a>
		</nav>

		<!-- Contact form section -->
		<div class="container" style="max-width: 500px">
			<h1>Let's Build Something</h1>
			<p>
				Have a project in mind? Reach out to our development team using the form below.
			</p>

			<!-- Simple contact form -->
			<form class="contact-form">
				<div>
					<label for="name">Full Name</label>
					<input type="text" id="name" placeholder="Aaadi" required />
				</div>
				<div>
					<label for="email">Email Address</label>
					<input type="email" id="email" placeholder="aaadi@example.com" required />
				</div>
				<div>
					<label for="message">Project Details</label>
					<textarea id="message" rows="5" placeholder="Tell us about your application..." required></textarea>
				</div>
				<button type="button">Submit Inquiry</button>
			</form>
		</div>
	</body>
</html>
